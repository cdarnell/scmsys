global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'tesla'
    static_configs:
      - targets: ['tesla_collector:8000']
    scrape_interval: 60s
    scrape_timeout: 10s
  
  - job_name: 'mgm'
    static_configs:
      - targets: ['host.docker.internal:8002']
    scrape_interval: 30s
    scrape_timeout: 10s
