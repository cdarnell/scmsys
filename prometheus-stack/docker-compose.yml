version: '3.8'
name: tesla-collector-stack

services:
  ngrok:
    image: ngrok/ngrok:latest
    environment:
      NGROK_AUTHTOKEN: "392ntTjNepYmoGOM0lvYO5C757w_6B7U7VxADLYuZVQXGNWse"
    command: http bootstrap:8080 --domain=sentiently-thigmotactic-desirae.ngrok-free.dev
    ports:
      - "4040:4040"  # ngrok dashboard
    depends_on:
      - bootstrap
    restart: always
    networks:
      - metrics_network

  

  tesla_collector:
    build: .
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      COLLECTION_INTERVAL: "60"
      METRICS_PORT: "8000"
    volumes:
      - ./:/app:delegated
    working_dir: /app
    command: ["/bin/sh", "-c", "cd /app && python scripts/collect_metrics.py"]
    ports:
      - "8000:8000"  # Prometheus metrics endpoint
    restart: always
    depends_on:
      - bootstrap
      - ngrok
    networks:
      - metrics_network

  bootstrap:
    build:
      context: .
      dockerfile: bootstrap/Dockerfile.bootstrap
    environment:
      TESLA_CLIENT_ID: "38df8e4a-ba0a-4e19-a032-8c65ced047f0"
      TESLA_CLIENT_SECRET: "ta-secret.MO@CUj1PiYm%5ztZ"
      REDIRECT_HOST: "sentiently-thigmotactic-desirae.ngrok-free.dev"
      REDIRECT_PORT: "8080"
      TESLA_SECRET_NAME: "tesla-credentials"
      NAMESPACE: "default"
      SCOPE: "openid email offline_access vehicle_device_data"
    volumes:
      - ./:/bootstrap_host:delegated  # Mount current dir so bootstrap can write .env
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    restart: always
    networks:
      - metrics_network

  
volumes:
  grafana_data:
networks:
  metrics_network:
    external: true


