apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesla-collector
  labels:
    app: tesla-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tesla-collector
  template:
    metadata:
      labels:
        app: tesla-collector
    spec:
      serviceAccountName: tesla-collector-sa
      containers:
        - name: tesla-collector
          image: your-registry/tesla-collector:latest
          imagePullPolicy: IfNotPresent
          # Load configuration from ConfigMap (`tesla-config`) and Secret (`tesla-credentials`).
          envFrom:
            - configMapRef:
                name: tesla-config
            - secretRef:
                name: tesla-credentials
          # Explicit mapping so the app always sees TESLA_ACCESS_TOKEN (from secret key `access_token`)
          env:
            - name: TESLA_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tesla-credentials
                  key: access_token
          ports:
            - name: metrics
              containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tesla-collector-metrics
  labels:
    app: tesla-collector
spec:
  type: ClusterIP
  selector:
    app: tesla-collector
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
