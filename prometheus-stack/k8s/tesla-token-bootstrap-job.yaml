apiVersion: batch/v1
kind: Job
metadata:
  name: tesla-token-bootstrap
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        job: tesla-token-bootstrap
    spec:
      serviceAccountName: tesla-collector-sa
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          # Replace image with the registry/image you build from bootstrap/Dockerfile.bootstrap
          image: tesla-collector-bootstrap:local
          imagePullPolicy: IfNotPresent
          env:
            - name: TESLA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tesla-credentials
                  key: client_id
            - name: TESLA_AUTH_URL
              value: "https://auth.tesla.com/oauth2/v3/authorize"
            - name: TESLA_TOKEN_URL
              value: "https://auth.tesla.com/oauth2/v3/token"
            - name: TESLA_SECRET_NAME
              value: "tesla-credentials"
            - name: REDIRECT_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: callback
          # ServiceAccount must have create/patch permission on the Secret
