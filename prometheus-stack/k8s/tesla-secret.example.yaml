apiVersion: v1
kind: Secret
metadata:
  name: tesla-credentials
type: Opaque
stringData:
  # OAuth2 client credentials (used for PKCE or server-side flows)
  client_id: "<your-client-id>"
  client_secret: "<your-client-secret>"
  # Optional: a short-lived access token for quick testing
  access_token: "<optional-short-lived-access-token>"
