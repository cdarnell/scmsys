version: "3.8"

services:
  vault:
    image: hashicorp/vault:1.16
    container_name: scmsys-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_API_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    volumes:
      - ./config:/vault/config:ro
      - ./data:/vault/data
    command:
      - vault
      - server
      - -config=/vault/config/vault.hcl
