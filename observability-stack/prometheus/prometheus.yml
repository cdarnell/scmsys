global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: zeroclaw_gateway
    static_configs:
      - targets: ["zeroclaw-gateway:3000"]

  - job_name: zeroclaw_planner
    static_configs:
      - targets: ["zerobot-planner:3101"]

  - job_name: zeroclaw_executor
    static_configs:
      - targets: ["zerobot-executor:3102"]

  - job_name: zeroclaw_memory
    static_configs:
      - targets: ["zerobot-memory:3103"]

  - job_name: traefik_proxy
    static_configs:
      - targets: ["zeroclaw-proxy:9100"]

  - job_name: tesla_collector
    static_configs:
      - targets: ["tesla_collector:8000"]

  - job_name: garmin_collector
    static_configs:
      - targets: ["garmin_collector:8001"]

  - job_name: mgm_metrics
    static_configs:
      - targets: ["host.docker.internal:8002"]

  - job_name: ollama
    static_configs:
      - targets: ["ollama:11439"]

  - job_name: docker_host
    static_configs:
      - targets: ["observability-node-exporter:9100"]

  - job_name: docker_containers
    static_configs:
      - targets: ["observability-cadvisor:8080"]

  - job_name: vector_aggregator
    static_configs:
      - targets: ["observability-vector:9598"]
