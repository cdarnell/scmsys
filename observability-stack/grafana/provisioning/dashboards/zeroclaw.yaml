apiVersion: 1

providers:
  - name: Zeroclaw Dashboards
    folder: ZeroClaw
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
  - name: Ollama Dashboards
    folder: Ollama
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/ollama
  - name: Docker Dashboards
    folder: Docker
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/docker
  - name: Windows Dashboards
    folder: Windows Hosts
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/windows
