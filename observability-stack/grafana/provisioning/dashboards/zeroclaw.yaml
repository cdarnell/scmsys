apiVersion: 1

providers:
  - name: Zeroclaw Dashboards
    folder: ZeroClaw
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/zeroclaw
    inputs:
      - name: DS_PROMETHEUS
        pluginId: prometheus
        type: datasource
        value: Prometheus
  - name: Ollama Dashboards
    folder: Ollama
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/ollama
    inputs:
      - name: DS_PROMETHEUS
        pluginId: prometheus
        type: datasource
        value: Prometheus
  - name: Docker Dashboards
    folder: Docker
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/docker
    inputs:
      - name: DS_PROMETHEUS
        pluginId: prometheus
        type: datasource
        value: Prometheus
  - name: Windows Dashboards
    folder: Windows Hosts
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/windows
    inputs:
      - name: DS_PROMETHEUS
        pluginId: prometheus
        type: datasource
        value: Prometheus
